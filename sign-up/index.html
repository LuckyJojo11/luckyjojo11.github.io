<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign Up</title>
    <link rel="icon" type="image/png" href="../icons/logo.png">
    <link rel="stylesheet" href="../styles.css?v=20260605-14">
    <link rel="stylesheet" href="../auth.css?v=20260605-5">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="../">
        <img class="brand-logo" src="../icons/logo.png" alt="" width="42" height="42">
        <span>LuckyJojo11's Stuff</span>
      </a>
      <div class="auth-area" data-auth-root></div>
    </header>

    <main class="auth-page">
      <section class="auth-dialog auth-page-card">
        <h1>Create Account</h1>
        <p>Choose a username, email and password.</p>
        <form class="auth-form" data-signup-form>
          <label>
            Username
            <input name="username" autocomplete="username" maxlength="32" required>
          </label>
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required>
          </label>
          <label>
            Password
            <input name="password" type="password" autocomplete="new-password" minlength="6" required>
          </label>
          <label>
            Profile image URL
            <input name="avatar" type="url" autocomplete="photo" placeholder="https://...">
          </label>
          <label>
            Upload profile image
            <input name="avatarFile" type="file" accept="image/*">
          </label>
          <p class="auth-status" data-auth-page-status></p>
          <div class="auth-actions">
            <a class="auth-secondary" href="../login/">Login</a>
            <button class="auth-button" type="submit">Create Account</button>
          </div>
        </form>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js?v=20260605-4"></script>
    <script src="../auth.js?v=20260605-6"></script>
  </body>
</html>
